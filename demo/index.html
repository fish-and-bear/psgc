<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>psgc</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#0a0f0d;color:#e8e4df;height:100vh;overflow:hidden}
::selection{background:#2d6a4f;color:#fff}

#map{position:fixed;inset:0;z-index:0}
.leaflet-control-zoom{margin:16px!important}
.leaflet-control-zoom a{background:rgba(10,15,13,.85)!important;color:#a8b4a0!important;border:1px solid rgba(255,255,255,.06)!important;backdrop-filter:blur(12px)}
html.dark-tiles .leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(.85) contrast(1.15) saturate(.7)}

/* the floating card */
.float{
  position:fixed;top:16px;left:16px;width:400px;max-height:calc(100vh - 32px);z-index:1000;
  background:rgba(10,15,13,.82);backdrop-filter:blur(28px) saturate(1.3);
  border:1px solid rgba(255,255,255,.06);border-radius:20px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03);
  transition:box-shadow .3s;
}
.float:hover{box-shadow:0 12px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04)}

.brand{padding:18px 20px 0;display:flex;align-items:center;gap:10px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:#52b788;box-shadow:0 0 8px #52b78860}
.brand h1{font-size:14px;font-weight:700;letter-spacing:-.2px;flex:1}
.brand small{font-size:10px;color:rgba(255,255,255,.2);font-family:'JetBrains Mono',monospace}

.search{padding:14px 20px;position:relative}
.search input{
  width:100%;padding:12px 16px 12px 40px;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.07);
  border-radius:14px;color:#e8e4df;font-size:14px;font-family:inherit;outline:none;
  transition:.2s;
}
.search input:focus{background:rgba(255,255,255,.08);border-color:rgba(82,183,136,.4);box-shadow:0 0 0 3px rgba(82,183,136,.08)}
.search input::placeholder{color:rgba(255,255,255,.2)}
.search svg{position:absolute;left:34px;top:50%;transform:translateY(-50%);opacity:.25}

.body{flex:1;overflow-y:auto;padding:0 20px 20px}
.body::-webkit-scrollbar{width:3px}.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* empty state */
.welcome{padding:40px 16px;text-align:center}
.welcome .flag{font-size:40px;margin-bottom:12px}
.welcome h2{font-size:16px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:6px}
.welcome p{font-size:12px;color:rgba(255,255,255,.15);line-height:1.7}

/* results */
.card{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
  border-radius:14px;padding:12px 16px;margin-bottom:6px;cursor:pointer;transition:.15s;
}
.card:hover{background:rgba(82,183,136,.06);border-color:rgba(82,183,136,.15)}
.card .nm{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
.card .sub{font-size:10px;color:rgba(255,255,255,.2);margin-top:3px;font-family:'JetBrains Mono',monospace}
.card-top{border-color:rgba(82,183,136,.2)}
.badge{padding:2px 6px;border-radius:5px;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.3px}
.b-reg{background:rgba(82,183,136,.12);color:#52b788}.b-prov{background:rgba(96,165,250,.12);color:#60a5fa}.b-city{background:rgba(251,191,36,.12);color:#fbbf24}.b-bgy{background:rgba(251,113,133,.12);color:#fb7185}
.pop{margin-left:auto;font-size:10px;color:rgba(255,255,255,.15);font-family:'JetBrains Mono',monospace}

/* profile / detail */
.profile{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.back{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:rgba(255,255,255,.3);cursor:pointer;padding:4px 0;margin-bottom:8px}
.back:hover{color:rgba(255,255,255,.5)}
.crumb{font-size:10px;color:rgba(255,255,255,.15);margin-bottom:10px;line-height:1.6}.crumb b{color:#52b788;font-weight:500}
.place-name{font-size:18px;font-weight:800;color:#e8e4df;margin-bottom:2px}
.place-pop{font-size:24px;font-weight:800;color:#52b788;letter-spacing:-.5px}
.place-pop-label{font-size:10px;color:rgba(255,255,255,.15);margin-bottom:14px}
.desc{font-size:12.5px;color:rgba(255,255,255,.35);line-height:1.7;margin-bottom:14px;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(255,255,255,.04)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.g{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:10px 12px}
.g .gv{font-size:13px;font-weight:700;color:#e8e4df}.g .gl{font-size:9px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

.dtl{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;overflow:hidden;margin-bottom:10px}
.dtl-h{padding:10px 14px;font-weight:600;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.4)}
.dtl-r{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)}
.dtl-r:last-child{border:none}
.dtl-r .k{color:rgba(255,255,255,.2)}.dtl-r .v{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.5)}

.loading{padding:32px;text-align:center;color:rgba(255,255,255,.15);font-size:12px}

/* map controls */
.map-ctrls{position:fixed;top:16px;right:56px;z-index:1000;display:flex;gap:4px}
.mc{background:rgba(10,15,13,.82);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:5px 10px;font-size:10px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;font-family:inherit;transition:.15s;appearance:none}
.mc:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.1)}
.mc select{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.mc-wrap{position:relative}

.leaflet-popup-content-wrapper{background:rgba(10,15,13,.9)!important;backdrop-filter:blur(16px)!important;color:#e8e4df!important;border-radius:10px!important;border:1px solid rgba(255,255,255,.06)!important;box-shadow:0 4px 20px rgba(0,0,0,.4)!important}
.leaflet-popup-tip{background:rgba(10,15,13,.9)!important}
.leaflet-popup-content{font-family:'Plus Jakarta Sans',system-ui!important;font-size:12px!important;margin:8px 12px!important;line-height:1.5!important}
.leaflet-popup-content b{color:#52b788}

@media(max-width:800px){.float{width:calc(100% - 32px);max-height:50vh;top:auto;bottom:16px}.map-ctrls{top:auto;bottom:calc(50vh + 24px)}}
</style>
</head>
<body>

<div id="map"></div>

<div class="map-ctrls">
  <div class="mc mc-wrap">🗺<select id="map-style" onchange="setMap(this.value)"><option value="dark" selected>Dark</option><option value="road">Road</option><option value="sat">Satellite</option></select></div>
</div>

<div class="float">
  <div class="brand"><div class="brand-dot"></div><h1>psgc</h1><small id="ver"></small></div>
  <div class="search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="q" placeholder="Where in the Philippines?" autofocus>
  </div>
  <div class="body" id="out">
    <div class="welcome">
      <div class="flag">🇵🇭</div>
      <h2>Explore the Philippines</h2>
      <p>42,011 barangays. 1,656 cities.<br>18 regions. 112 million people.<br><br>Type any place to begin.</p>
    </div>
  </div>
</div>

<script>
let M,mk=[],ln=[],tile,hist=[];
const A='',E=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML};
const TILES={dark:'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',road:'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',sat:'https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}'};
function cl(){mk.forEach(m=>M.removeLayer(m));mk=[];ln.forEach(l=>M.removeLayer(l));ln=[]}
function pin(lt,lg,lb,co='#52b788',sz=7){const m=L.circleMarker([lt,lg],{radius:sz,fillColor:co,color:'#fff',weight:1.5,fillOpacity:.85}).addTo(M);m.bindPopup(`<b>${E(lb)}</b><br><span style="opacity:.4">${lt.toFixed(4)}, ${lg.toFixed(4)}</span>`);mk.push(m);return m}
function bc(l){return{region:'b-reg',province:'b-prov',city:'b-city',barangay:'b-bgy',municipality:'b-city'}[l]||'b-bgy'}
function mc(l){return{region:'#52b788',province:'#60a5fa',city:'#fbbf24',barangay:'#fb7185'}[l]||'#fb7185'}
function fP(n){if(!n)return'';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return Math.round(n/1e3)+'K';return n}
function setMap(s){M.removeLayer(tile);tile=L.tileLayer(TILES[s],{maxZoom:20}).addTo(M);document.documentElement.classList.toggle('dark-tiles',s==='dark')}
function debounce(fn,ms){let t;return function(){clearTimeout(t);t=setTimeout(()=>fn.apply(this,arguments),ms)}}

document.addEventListener('DOMContentLoaded',()=>{
  M=L.map('map',{zoomControl:true,minZoom:5,maxBounds:[[2,112],[23,132]],maxBoundsViscosity:.8}).setView([12,122],6);
  tile=L.tileLayer(TILES.dark,{maxZoom:20}).addTo(M);
  document.documentElement.classList.add('dark-tiles');

  M.on('click',async e=>{
    const lat=e.latlng.lat.toFixed(4),lng=e.latlng.lng.toFixed(4);
    cl();pin(+lat,+lng,'📍','#fbbf24',8);
    const r=await fetch(`${A}/api/reverse?lat=${lat}&lng=${lng}`);const d=await r.json();
    if(d.barangay_code)showProfile(d.barangay_code);
  });

  fetch(`${A}/api/stats`).then(r=>r.json()).then(d=>{document.getElementById('ver').textContent=`v${d.version}`});
  fetch(`${A}/api/regions`).then(r=>r.json()).then(regs=>{regs.forEach(r=>{if(r.latitude)pin(r.latitude,r.longitude,r.name,'#52b788',3)})});

  const q=document.getElementById('q');
  q.addEventListener('input',debounce(()=>doSearch(q.value),200));
  q.addEventListener('keydown',e=>{if(e.key==='Enter'&&lastResults.length){e.preventDefault();showProfile(lastResults[0].psgc_code)}});
  q.addEventListener('focus',()=>{if(lastResults.length)renderResults()});
});

let lastResults=[],lastQuery='';

async function doSearch(q){
  lastQuery=q;
  if(!q||q.length<2){document.getElementById('out').innerHTML=`<div class="welcome"><div class="flag">🇵🇭</div><h2>Explore the Philippines</h2><p>42,011 barangays. 1,656 cities.<br>18 regions. 112 million people.<br><br>Type any place to begin.</p></div>`;lastResults=[];return}
  document.getElementById('out').innerHTML='<div class="loading">Searching...</div>';
  const r=await fetch(`${A}/api/search?q=${encodeURIComponent(q)}&n=10&threshold=55`);
  lastResults=await r.json();cl();
  if(!lastResults.length){document.getElementById('out').innerHTML=`<div class="loading">Nothing found</div>`;return}
  renderResults();
  const bds=[];lastResults.forEach((d,i)=>{if(d.latitude){pin(d.latitude,d.longitude,d.name,mc(d.level),i===0?7:4);bds.push([d.latitude,d.longitude])}});
  if(bds.length>1)M.fitBounds(bds,{padding:[30,30],maxZoom:12});else if(bds.length)M.flyTo(bds[0],12);
}

function renderResults(){
  let h='';
  lastResults.forEach((d,i)=>{
    const p=fP(d.population);
    h+=`<div class="card${i===0?' card-top':''}" onclick="showProfile('${d.psgc_code}')"><div class="nm">${E(d.name)}<span class="badge ${bc(d.level)}">${d.level}</span>${p?`<span class="pop">${p}</span>`:''}</div><div class="sub">${d.psgc_code}</div></div>`;
  });
  document.getElementById('out').innerHTML=h;
}

async function showProfile(code){
  document.getElementById('out').innerHTML='<div class="loading">Loading...</div>';
  const r=await fetch(`${A}/api/profile?code=${code}`);const p=await r.json();
  if(!p.ok){
    const r2=await fetch(`${A}/api/get?q=${code}`);const d=await r2.json();
    if(d.error==='ambiguous'){
      let h='';d.matches.forEach(m=>{h+=`<div class="card" onclick="showProfile('${m.psgc_code}')"><div class="nm">${E(m.name)}</div><div class="sub">${m.parent||''}</div></div>`});
      document.getElementById('out').innerHTML=h;
    }
    return;
  }
  hist.push(code);cl();
  if(p.coordinate)pin(p.coordinate.latitude,p.coordinate.longitude,p.name,'#52b788',9).openPopup();

  let h='<div class="profile">';

  // back
  if(hist.length>1||lastQuery)h+=`<div class="back" onclick="goBack()">← back</div>`;

  // breadcrumb (clickable)
  if(p.breadcrumb&&p.breadcrumb.length>1)h+=`<div class="crumb">${p.breadcrumb.map((b,i)=>i<p.breadcrumb.length-1?`<b onclick="showProfile('${b.code}')">${E(b.name)}</b>`:`<b style="color:rgba(255,255,255,.5);cursor:default">${E(b.name)}</b>`).join(' → ')}</div>`;

  // name + population hero
  h+=`<div class="place-name">${E(p.name)}</div>`;
  if(p.population){
    h+=`<div class="place-pop">${Number(p.population).toLocaleString()}</div>`;
    h+=`<div class="place-pop-label">population</div>`;
  }

  // description
  if(p.description)h+=`<div class="desc">${E(p.description)}</div>`;

  // stat grid
  const stats=[];
  if(p.island_group)stats.push([p.island_group.charAt(0).toUpperCase()+p.island_group.slice(1),'Island Group']);
  if(p.urban_rural)stats.push([p.urban_rural==='U'?'Urban':'Rural','Classification']);
  if(p.children_count>0)stats.push([p.children_count.toLocaleString(),'Subdivisions']);
  if(p.income_classification)stats.push([p.income_classification,'Income Class']);
  if(stats.length){h+=`<div class="grid">`;stats.forEach(([v,l])=>{h+=`<div class="g"><div class="gv">${v}</div><div class="gl">${l}</div></div>`});h+=`</div>`}

  // detail rows
  h+=`<div class="dtl"><div class="dtl-h">Details</div>`;
  if(p.city_class)h+=`<div class="dtl-r"><span class="k">City Class</span><span class="v">${p.city_class}</span></div>`;
  h+=`<div class="dtl-r"><span class="k">PSGC</span><span class="v">${p.psgc_code}</span></div>`;
  if(p.coordinate)h+=`<div class="dtl-r"><span class="k">Coordinate</span><span class="v">${p.coordinate.latitude.toFixed(4)}, ${p.coordinate.longitude.toFixed(4)}</span></div>`;
  h+=`</div>`;

  // sub-municipalities
  if(p.sub_municipalities?.length){
    h+=`<div class="dtl"><div class="dtl-h">Districts</div>`;
    p.sub_municipalities.forEach(sm=>{
      h+=`<div class="card" onclick="showProfile('${sm.psgc_code}')"><div class="nm">${E(sm.name)}<span class="pop">${sm.barangay_count} bgys</span></div></div>`;
    });
    h+=`</div>`;
  }

  h+=`</div>`;
  document.getElementById('out').innerHTML=h;

  // fly to
  if(p.coordinate){
    const z=p.level==='barangay'?15:p.level==='city'?13:p.level==='province'?10:8;
    M.flyTo([p.coordinate.latitude,p.coordinate.longitude],z,{duration:1});
  }
}

function goBack(){
  hist.pop();
  if(hist.length>0)showProfile(hist.pop());
  else if(lastQuery){renderResults();const bds=[];lastResults.forEach(d=>{if(d.latitude)bds.push([d.latitude,d.longitude])});if(bds.length>1)M.fitBounds(bds,{padding:[30,30],maxZoom:12})}
  else document.getElementById('out').innerHTML=`<div class="welcome"><div class="flag">🇵🇭</div><h2>Explore the Philippines</h2><p>Type any place to begin.</p></div>`;
}
</script>
</body>
</html>
